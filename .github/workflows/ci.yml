name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run local validation gate
        env:
          AGENT_FOUNDATION_AGENT_TOKEN: agent-token
          AGENT_FOUNDATION_OPERATOR_TOKEN: operator-token
        run: make validate-local

  plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw/plugin_adapter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: openclaw/plugin_adapter/package-lock.json

      - name: Install plugin dependencies
        run: npm ci

      - name: Run plugin adapter tests
        run: npm test

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run full release gate and shadow summary
        env:
          AGENT_FOUNDATION_AGENT_TOKEN: agent-token
          AGENT_FOUNDATION_OPERATOR_TOKEN: operator-token
          RELEASE_CHECK_PROFILE: full
        run: |
          make release-check RELEASE_CHECK_PROFILE=full
          python scripts/run_shadow_pilot.py --run-id nightly-shadow
