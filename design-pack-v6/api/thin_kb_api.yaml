openapi: 3.1.0
info:
  title: agent-foundation Thin KB API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8082
paths:
  /v1/kb/search:
    post:
      summary: Search Thin KB
      operationId: searchKB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                object_types:
                  type: array
                  items: { type: string, enum: [claim, procedure, case, decision] }
                domain_tags:
                  type: array
                  items: { type: string }
                scope: { type: string }
                limit: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Search response
  /v1/kb/object/{id}:
    get:
      summary: Get KB object by id
      operationId: getKBObject
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Object
  /v1/kb/related/{id}:
    get:
      summary: Get related KB objects
      operationId: getKBRelated
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Related objects
