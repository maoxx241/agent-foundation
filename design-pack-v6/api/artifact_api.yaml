openapi: 3.1.0
info:
  title: agent-foundation Artifact API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8081
paths:
  /v1/tasks:
    post:
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskBrief'
      responses:
        '200':
          description: Task created
  /v1/tasks/{task_id}:
    get:
      summary: Get task bundle summary
      operationId: getTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Task summary
  /v1/tasks/{task_id}/state:
    patch:
      summary: Update task state
      operationId: updateTaskState
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state, changed_by]
              properties:
                state: { type: string }
                changed_by: { type: string }
                reason: { type: string }
      responses:
        '200':
          description: Updated
  /v1/tasks/{task_id}/artifacts:
    get:
      summary: List artifacts in task
      operationId: listArtifacts
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Artifact list
  /v1/tasks/{task_id}/artifacts/{stage}/{name}:
    get:
      summary: Read one artifact
      operationId: getArtifact
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
        - in: path
          name: stage
          required: true
          schema: { type: string }
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Artifact content
    put:
      summary: Write one artifact
      operationId: putArtifact
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
        - in: path
          name: stage
          required: true
          schema: { type: string }
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, format]
              properties:
                format:
                  type: string
                  enum: [json, markdown, text]
                content:
                  description: Raw JSON object or text payload depending on format
      responses:
        '200':
          description: Written
  /v1/tasks/{task_id}/experience/finalize:
    post:
      summary: Finalize experience packet
      operationId: finalizeExperience
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Finalized
components:
  schemas:
    TaskBrief:
      type: object
      additionalProperties: false
      required: [task_id, project_id, title, goal, created_at, updated_at]
      properties:
        task_id: { type: string }
        project_id: { type: string }
        title: { type: string }
        goal: { type: string }
        description: { type: string }
        requester: { type: string }
        priority: { type: string, enum: [low, medium, high, critical] }
        domain_tags:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
